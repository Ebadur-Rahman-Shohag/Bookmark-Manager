<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookmark Manager | Save & Organize Your Links</title>
    <meta name="description" content="A modern bookmark manager to save, organize, and search your bookmarks with ease." />
    
    <style>
      :root {
        --bg-primary: #ffffff;
        --bg-secondary: #f8fafc;
        --bg-tertiary: #f1f5f9;
        --accent-primary: #0066cc;
        --accent-hover: #0052a3;
        --text-primary: #0f172a;
        --text-secondary: #64748b;
        --border-color: #e2e8f0;
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        background-color: var(--bg-secondary);
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: var(--bg-secondary);
        color: var(--text-primary);
        line-height: 1.6;
      }

      /* Scrollbar Styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: var(--bg-secondary);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--accent-primary);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent-hover);
      }
    </style>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg: {
                primary: '#ffffff',
                secondary: '#f8fafc',
                tertiary: '#f1f5f9',
              },
              accent: {
                primary: '#0066cc',
                hover: '#0052a3',
              },
              text: {
                primary: '#0f172a',
                secondary: '#64748b',
              },
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            boxShadow: {
              sm: '0 1px 2px 0 rgba(0, 0, 0, 0.3)',
              md: '0 4px 6px -1px rgba(0, 0, 0, 0.4)',
              lg: '0 10px 15px -3px rgba(0, 0, 0, 0.5)',
            },
            borderRadius: {
              lg: '12px',
              xl: '16px',
              '2xl': '20px',
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-in',
              'slide-up': 'slideUp 0.4s ease-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
            },
          },
        },
      }
    </script>

    <!-- Sweet Alert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <main class="min-h-screen bg-gradient-to-br from-bg-primary via-bg-primary to-bg-secondary py-8 md:py-12">
      <!-- Main Container -->
      <div class="container max-w-6xl mx-auto px-4 md:px-6">
        <!-- Header Section -->
        <header class="mb-12 text-center animate-fade-in">
          <div class="inline-block mb-4">
            <div class="flex items-center justify-center w-14 h-14 rounded-xl bg-accent-primary/10 border border-accent-primary/30">
              <svg class="w-8 h-8 text-accent-primary" fill="currentColor" viewBox="0 0 20 20">
                <path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z" />
              </svg>
            </div>
          </div>
          <h1 class="text-4xl md:text-5xl font-bold text-text-primary mb-2">
            Bookmark Manager
          </h1>
          <p class="text-text-secondary text-lg max-w-2xl mx-auto">
            Save, organize, and quickly access your favorite websites with a modern, intuitive interface
          </p>
        </header>

        <!-- Add Bookmark Form -->
        <div class="mb-12 animate-slide-up">
          <div class="bg-bg-secondary/40 backdrop-blur-sm border border-accent-primary/20 rounded-2xl p-8 shadow-lg">
            <h2 class="text-xl font-semibold text-text-primary mb-6 flex items-center gap-2">
              <svg class="w-6 h-6 text-accent-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
              </svg>
              Add New Bookmark
            </h2>
            
            <form class="space-y-4">
              <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-1">
                  <label for="title" class="block text-sm font-medium text-text-secondary mb-2">
                    Title
                  </label>
                  <input
                    id="title"
                    type="text"
                    placeholder="e.g., GitHub"
                    class="w-full px-4 py-3 bg-bg-primary border border-border-color rounded-lg focus:outline-none focus:ring-2 focus:ring-accent-primary focus:border-transparent transition-all duration-200 text-text-primary placeholder-text-secondary/50"
                  />
                </div>

                <div class="md:col-span-1">
                  <label for="link" class="block text-sm font-medium text-text-secondary mb-2">
                    Link
                  </label>
                  <input
                    id="link"
                    type="url"
                    placeholder="https://example.com"
                    class="w-full px-4 py-3 bg-bg-primary border border-border-color rounded-lg focus:outline-none focus:ring-2 focus:ring-accent-primary focus:border-transparent transition-all duration-200 text-text-primary placeholder-text-secondary/50"
                  />
                </div>

                <div class="md:col-span-1">
                  <label for="category" class="block text-sm font-medium text-text-secondary mb-2">
                    Category
                  </label>
                  <input
                    id="category"
                    type="text"
                    placeholder="e.g., Development"
                    class="w-full px-4 py-3 bg-bg-primary border border-border-color rounded-lg focus:outline-none focus:ring-2 focus:ring-accent-primary focus:border-transparent transition-all duration-200 text-text-primary placeholder-text-secondary/50"
                  />
                </div>
              </div>

              <button
                id="btn-add"
                type="button"
                class="w-full md:w-auto px-8 py-3 bg-gradient-to-r from-accent-primary to-accent-hover rounded-lg font-semibold text-bg-primary hover:shadow-lg transition-all duration-200 transform hover:scale-105 active:scale-95"
              >
                <svg class="inline-block w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                Add Bookmark
              </button>
            </form>
          </div>
        </div>

        <!-- Search Bar -->
        <div class="mb-8 animate-slide-up" style="animation-delay: 0.1s;">
          <div class="relative">
            <svg class="absolute left-4 top-1/2 transform -translate-y-1/2 w-5 h-5 text-text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input
              id="search"
              type="text"
              placeholder="Search bookmarks by title..."
              class="w-full pl-12 pr-4 py-3 bg-bg-secondary border border-border-color rounded-lg focus:outline-none focus:ring-2 focus:ring-accent-primary focus:border-transparent transition-all duration-200 text-text-primary placeholder-text-secondary/50"
            />
          </div>
        </div>

        <!-- No Bookmarks Found Message -->
        <div id="not-found" class="hidden">
          <div class="text-center py-16">
            <svg class="w-16 h-16 mx-auto text-text-secondary/40 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9-4v4m4-4v4" />
            </svg>
            <p class="text-xl font-semibold text-text-secondary">No bookmarks found</p>
            <p class="text-text-secondary/70 mt-2">Try adjusting your search or add a new bookmark</p>
          </div>
        </div>

        <!-- Bookmarks Grid -->
        <div
          id="bookmarks-container"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
        >
          <!-- Cards will be generated here -->
        </div>
      </div>
    </main>

    <script type="module" src="./js/script.js"></script>
  </body>
</html>
