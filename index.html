<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookmark Manager | Save & Organize Your Links</title>
    <meta name="description" content="A modern bookmark manager to save, organize, and search your bookmarks with ease." />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Sweet Alert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <!-- ── NAVBAR ── -->
    <nav class="navbar" role="banner">
      <div class="navbar-inner">
        <a href="#" class="navbar-brand" aria-label="Bookmark Manager home">
          <div class="brand-icon" aria-hidden="true">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
              <path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"/>
            </svg>
          </div>
          <span class="brand-name">Bookmark<span class="brand-accent">Manager</span></span>
        </a>

        <div class="navbar-actions">
          <button id="theme-toggle" class="theme-btn" aria-label="Toggle dark mode" title="Toggle dark mode">
            <svg class="icon-sun" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>
            </svg>
            <svg class="icon-moon" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <main>
      <!-- ── HERO ── -->
      <section class="hero" aria-labelledby="hero-heading">
        <div class="hero-glow" aria-hidden="true"></div>
        <div class="hero-glow hero-glow-2" aria-hidden="true"></div>
        <div class="container">
          <div class="hero-content">
            <div class="hero-badge">
              <svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                <path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"/>
              </svg>
              Bookmark Manager
            </div>
            <h1 id="hero-heading" class="hero-title">
              Organize your<br/>
              <span class="hero-title-accent">digital world</span>
            </h1>
            <p class="hero-subtitle">Save, search, and manage all your important links in one beautiful place.</p>
          </div>
        </div>
      </section>

      <!-- ── MAIN CONTENT ── -->
      <div class="container main-content">

        <!-- Add Bookmark Form -->
        <section class="card form-card" aria-labelledby="form-heading">
          <div class="card-header">
            <div class="card-icon" aria-hidden="true">
              <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
              </svg>
            </div>
            <h2 id="form-heading" class="card-title">Add New Bookmark</h2>
          </div>

          <form class="form-grid" novalidate>
            <div class="form-group">
              <label for="title" class="form-label">Title <span class="required" aria-label="required">*</span></label>
              <div class="input-wrapper">
                <span class="input-icon" aria-hidden="true">
                  <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h10M7 12h6"/>
                  </svg>
                </span>
                <input id="title" type="text" placeholder="e.g., GitHub" class="form-input" autocomplete="off" />
              </div>
            </div>

            <div class="form-group">
              <label for="link" class="form-label">URL <span class="required" aria-label="required">*</span></label>
              <div class="input-wrapper">
                <span class="input-icon" aria-hidden="true">
                  <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                  </svg>
                </span>
                <input id="link" type="url" placeholder="https://example.com" class="form-input" autocomplete="off" />
              </div>
            </div>

            <div class="form-group">
              <label for="category" class="form-label">Category</label>
              <div class="input-wrapper">
                <span class="input-icon" aria-hidden="true">
                  <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/>
                  </svg>
                </span>
                <input id="category" type="text" placeholder="e.g., Development" class="form-input" autocomplete="off" />
              </div>
            </div>

            <div class="form-action">
              <button id="btn-add" type="button" class="btn-primary">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
                </svg>
                Add Bookmark
              </button>
            </div>
          </form>
        </section>

        <!-- Search -->
        <section class="search-section" aria-label="Search bookmarks">
          <div class="search-wrapper">
            <span class="search-icon" aria-hidden="true">
              <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
            </span>
            <input id="search" type="search" placeholder="Search by title or category..." class="search-input" aria-label="Search bookmarks" />
          </div>
        </section>

        <!-- Empty / Not Found State -->
        <div id="not-found" class="empty-state hidden" role="status" aria-live="polite">
          <div class="empty-icon" aria-hidden="true">
            <svg width="40" height="40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"/>
            </svg>
          </div>
          <h3 class="empty-title">No bookmarks found</h3>
          <p class="empty-subtitle">Try adjusting your search or add a new bookmark to get started.</p>
        </div>

        <!-- Bookmarks Grid -->
        <div id="bookmarks-container" class="bookmarks-grid" role="list" aria-label="Bookmarks"></div>

      </div>
    </main>

    <!-- ── FOOTER ── -->
    <footer class="footer" role="contentinfo">
      <p>Built with <span aria-label="love">♥</span> — Bookmark Manager</p>
    </footer>

    <script type="module" src="./js/script.js"></script>
  </body>
</html>
